<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Cousin CMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div id="login-screen" class="login-screen hidden">
    <div class="login-card">
      <h1>Cousin CMS</h1>
      <p class="subtitle">Sign in to edit director reels.</p>
      <form id="login-form">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
        <button type="submit">Sign in</button>
        <p id="login-error" class="error-msg" role="alert"></p>
      </form>
    </div>
  </div>

  <div id="editor-screen" class="editor-screen hidden">
    <header class="top-bar">
      <div class="top-bar-brand">
        <h1>Cousin CMS</h1>
        <p id="last-updated" class="last-updated"></p>
      </div>
      <div class="top-bar-actions">
        <span id="status-pill" class="status-pill saved">Saved</span>
        <a href="#" id="live-site-btn" class="site-btn secondary" target="_blank" rel="noopener">Live site</a>
        <button type="button" id="preview-btn" class="secondary">Draft site</button>
        <button type="button" id="save-btn" class="secondary" disabled>Save</button>
        <button type="button" id="publish-btn" disabled>Publish</button>
        <button type="button" id="logout-btn" class="ghost hidden">Sign out</button>
      </div>
    </header>

    <nav id="director-tabs" class="director-tabs" aria-label="Directors"></nav>

    <main class="editor-main">
      <p id="director-intro" class="editor-intro"></p>
      <p id="load-error" class="error-msg hidden" role="alert"></p>
      <ul id="project-list" class="project-list"></ul>
      <div class="add-project-row">
        <button type="button" id="add-project-btn" class="secondary">+ Add project</button>
      </div>
    </main>
  </div>

  <script src="config.js"></script>
  <script src="admin.js"></script>
</body>
</html>
